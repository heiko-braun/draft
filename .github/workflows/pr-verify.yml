name: PR Verification

on:
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Check code formatting
        run: |
          go fmt ./...
          if [ -n "$(git status --porcelain)" ]; then
            echo "Code is not formatted. Please run 'go fmt ./...'"
            git diff
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Build CLI
        run: go build -o bin/draft ./cmd/draft

      - name: Run tests (if any)
        run: go test -v ./...
